<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Assistant">
<link rel="apple-touch-icon" id="appIcon" href="">
<title>Mon Assistant</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; color:#ffffff; }
  input { color:#ffffff !important; }
  .api-bar input::placeholder { color:rgba(255,255,255,0.5) !important; }
  .task-meta { color:#B5CAC1 !important; }
  .transcript-box .label, .response-box .label { color:#B5CAC1 !important; }

  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#054f64; min-height:100vh; display:flex; flex-direction:column; }

  header { padding:50px 24px 20px; text-align:center; }
  .date { font-size:13px; color:#B5CAC1; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; }
  h1 { font-size:22px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:10px; }

  .api-bar { margin:0 20px 10px; display:flex; gap:8px; align-items:center; }
  .api-bar input { flex:1; background:#076880; border:1px solid #B5CAC1; border-radius:10px; padding:10px 14px; font-size:13px; outline:none; }
  .api-bar button { background:#B5CAC1; border:none; border-radius:10px; padding:10px 14px; color:#054f64; font-size:13px; cursor:pointer; font-weight:600; }
  .ms-btn { width:calc(100% - 40px); margin:0 20px 16px; background:#054f64 !important; border:1px solid #B5CAC1 !important; border-radius:10px; padding:12px; color:#fff !important; font-size:13px; cursor:pointer; text-align:center; }

  .mic-area { display:flex; flex-direction:column; align-items:center; padding:24px; gap:14px; }
  .mic-btn { width:90px; height:90px; border-radius:50%; border:none; background:linear-gradient(135deg,#076880,#B5CAC1); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:36px; box-shadow:0 0 30px rgba(181,202,193,0.3); transition:all 0.2s; }
  .mic-btn.recording { background:linear-gradient(135deg,#ff4757,#ff6b81); box-shadow:0 0 40px rgba(255,71,87,0.6); animation:pulse 1.2s infinite; }
  .mic-btn.loading { animation:spin-glow 1.5s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  @keyframes spin-glow { 0%,100%{box-shadow:0 0 30px rgba(181,202,193,0.3)} 50%{box-shadow:0 0 60px rgba(181,202,193,0.7)} }
  .mic-label { font-size:14px; }

  .transcript-box { margin:0 20px; background:#076880; border:1px solid #B5CAC1; border-radius:16px; padding:16px; min-height:60px; font-size:15px; line-height:1.5; display:none; }
  .transcript-box.visible { display:block; }
  .transcript-box .label { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }

  .response-box { margin:14px 20px; background:#043d4f; border:1px solid #B5CAC1; border-radius:16px; padding:16px; display:none; }
  .response-box.visible { display:block; }
  .response-box .label { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:10px; }
  .response-box p { font-size:15px; line-height:1.6; }

  .tasks-section { margin:0 20px 20px; }
  .tasks-section h2 { font-size:13px; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:12px; }
  .task-card { background:#076880; border:1px solid #B5CAC1; border-radius:12px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:flex-start; gap:12px; animation:slideIn 0.3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .task-dot { width:10px; height:10px; border-radius:50%; margin-top:4px; flex-shrink:0; }
  .dot-urgent{background:#ff4757} .dot-normal{background:#B5CAC1} .dot-reminder{background:#ffffff}
  .task-info { flex:1; }
  .task-title { font-size:15px; font-weight:500; margin-bottom:4px; }
  .task-meta { font-size:12px; color:#B5CAC1 !important; }
  .task-check { width:22px; height:22px; border-radius:50%; border:2px solid #B5CAC1; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; transition:all 0.2s; }
  .task-check.done { background:#B5CAC1; color:#054f64; }
  .empty-state { text-align:center; padding:40px 20px; font-size:14px; line-height:1.8; }
  .empty-state .icon { font-size:40px; margin-bottom:12px; }
  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#B5CAC1; margin-right:6px; }
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#076880; border:1px solid #B5CAC1; border-radius:20px; padding:10px 20px; font-size:13px; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<header>
  <div class="date" id="dateDisplay"></div>
  <h1>
    <svg width="32" height="32" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" fill="#054f64" rx="48"/>
      <line x1="100" y1="8" x2="100" y2="192" stroke="#fff" stroke-width="0.7" stroke-dasharray="2 8" opacity="0.2" stroke-linecap="round"/>
      <line x1="8" y1="100" x2="192" y2="100" stroke="#fff" stroke-width="0.7" stroke-dasharray="2 8" opacity="0.2" stroke-linecap="round"/>
      <path d="M18 100 Q100 18 182 100" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <path d="M20 104 Q100 22 180 104" fill="none" stroke="#fff" stroke-width="0.5" stroke-linecap="round" opacity="0.25"/>
      <path d="M18 100 Q100 182 182 100" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <path d="M20 96 Q100 178 180 96" fill="none" stroke="#fff" stroke-width="0.5" stroke-linecap="round" opacity="0.25"/>
      <rect x="0" y="0" width="22" height="200" fill="#054f64"/>
      <rect x="178" y="0" width="22" height="200" fill="#054f64"/>
      <circle cx="100" cy="100" r="28" fill="#076880"/>
      <ellipse cx="107" cy="100" rx="22" ry="28" fill="#054f64" opacity="0.22"/>
      <circle cx="100" cy="100" r="28" fill="none" stroke="#B5CAC1" stroke-width="1.3"/>
      <ellipse cx="100" cy="100" rx="48" ry="12" fill="none" stroke="#B5CAC1" stroke-width="1.5" transform="rotate(-15 100 100)"/>
      <circle cx="100" cy="100" r="28" fill="#076880"/>
      <circle cx="100" cy="100" r="28" fill="none" stroke="#B5CAC1" stroke-width="1.3"/>
      <circle cx="90" cy="89" r="6" fill="#fff" opacity="0.1"/>
      <circle cx="88" cy="87" r="2.5" fill="#fff" opacity="0.2"/>
    </svg>
    Bonjour !
  </h1>
</header>

<button class="ms-btn" id="msBtn" onclick="signInGoogle()">🔗 Connecter Google Calendar & Tasks</button>

<div class="api-bar">
  <input type="password" id="apiKey" placeholder="Clé Groq (gsk_...)"/>
  <button onclick="saveKey()">💾</button>
</div>

<div class="mic-area">
  <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎙️</button>
  <div class="mic-label" id="micLabel">Appuie pour parler</div>
</div>

<div class="transcript-box" id="transcriptBox">
  <div class="label">Tu as dit</div>
  <div id="transcriptText"></div>
</div>

<div class="response-box" id="responseBox">
  <div class="label"><span class="status-dot"></span>Ton assistant</div>
  <p id="responseText"></p>
</div>

<div class="tasks-section">
  <h2>Tâches du jour</h2>
  <div id="tasksList">
    <div class="empty-state">
      <div class="icon">🎙️</div>
      Parle à ton assistant ce matin<br>pour voir tes tâches apparaître ici
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  // ── Icône PWA ──────────────────────────────────────────────
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#054f64';
  ctx.beginPath(); ctx.moveTo(123,0); ctx.lineTo(389,0);
  ctx.quadraticCurveTo(512,0,512,123); ctx.lineTo(512,389);
  ctx.quadraticCurveTo(512,512,389,512); ctx.lineTo(123,512);
  ctx.quadraticCurveTo(0,512,0,389); ctx.lineTo(0,123);
  ctx.quadraticCurveTo(0,0,123,0); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.8; ctx.globalAlpha=0.2;
  ctx.setLineDash([5,20]); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(256,20); ctx.lineTo(256,492); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(20,256); ctx.lineTo(492,256); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha=1;
  ctx.strokeStyle='#fff'; ctx.lineWidth=18; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(46,256); ctx.quadraticCurveTo(256,46,466,256); ctx.stroke();
  ctx.lineWidth=5; ctx.globalAlpha=0.25;
  ctx.beginPath(); ctx.moveTo(50,276); ctx.quadraticCurveTo(256,66,462,276); ctx.stroke();
  ctx.globalAlpha=1; ctx.lineWidth=18;
  ctx.beginPath(); ctx.moveTo(46,256); ctx.quadraticCurveTo(256,466,466,256); ctx.stroke();
  ctx.lineWidth=5; ctx.globalAlpha=0.25;
  ctx.beginPath(); ctx.moveTo(50,236); ctx.quadraticCurveTo(256,446,462,236); ctx.stroke();
  ctx.globalAlpha=1;
  ctx.fillStyle='#054f64'; ctx.fillRect(0,0,56,512); ctx.fillRect(456,0,56,512);
  ctx.fillStyle='#076880'; ctx.beginPath(); ctx.arc(256,256,90,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#054f64'; ctx.globalAlpha=0.22;
  ctx.beginPath(); ctx.ellipse(278,256,70,90,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1; ctx.strokeStyle='#B5CAC1'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.arc(256,256,90,0,Math.PI*2); ctx.stroke();
  ctx.save(); ctx.translate(256,256); ctx.rotate(-15*Math.PI/180);
  ctx.strokeStyle='#B5CAC1'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.ellipse(0,0,155,40,0,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#076880'; ctx.beginPath(); ctx.arc(256,256,90,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#B5CAC1'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.arc(256,256,90,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.globalAlpha=0.1;
  ctx.beginPath(); ctx.arc(226,220,20,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.2; ctx.beginPath(); ctx.arc(218,212,8,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  document.getElementById('appIcon').href = c.toDataURL('image/png');

  // ── Manifest PWA ───────────────────────────────────────────
  const manifest = { name:"Mon Assistant", short_name:"Assistant", start_url:"/", display:"standalone", background_color:"#054f64", theme_color:"#054f64" };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const mlink = document.createElement('link');
  mlink.rel='manifest'; mlink.href=URL.createObjectURL(blob);
  document.head.appendChild(mlink);

  // ── Date ───────────────────────────────────────────────────
  const now = new Date();
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });

  // ── Clé Groq ───────────────────────────────────────────────
  let GROQ_KEY = localStorage.getItem('groq_key') || '';
  if (GROQ_KEY) document.getElementById('apiKey').value = GROQ_KEY;

  function saveKey() {
    GROQ_KEY = document.getElementById('apiKey').value.trim();
    localStorage.setItem('groq_key', GROQ_KEY);
    showToast('✅ Clé sauvegardée !');
  }
  window.saveKey = saveKey;

  // ── Toast ──────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Google Auth (PKCE) ─────────────────────────────────────
  const G_CLIENT_ID = '388486752894-ekeiej8dkbq6iql51cifhphe828nrn8e.apps.googleusercontent.com';
  const G_REDIRECT  = 'https://loananselin-eng.github.io/Assistant-vocal/';
  const G_SCOPES    = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/tasks';
  let gToken = null;

  function generateRandom(len) {
    const arr = new Uint8Array(len);
    crypto.getRandomValues(arr);
    return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }

  async function sha256(plain) {
    const enc = new TextEncoder().encode(plain);
    const hash = await crypto.subtle.digest('SHA-256', enc);
    return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }

  async function signInGoogle() {
    const verifier = generateRandom(64);
    const challenge = await sha256(verifier);
    sessionStorage.setItem('pkce_verifier', verifier);
    const state = generateRandom(16);
    sessionStorage.setItem('pkce_state', state);
    const url = 'https://accounts.google.com/o/oauth2/v2/auth'
      + '?client_id=' + G_CLIENT_ID
      + '&response_type=code'
      + '&redirect_uri=' + encodeURIComponent(G_REDIRECT)
      + '&scope=' + encodeURIComponent(G_SCOPES)
      + '&state=' + state
      + '&code_challenge=' + challenge
      + '&code_challenge_method=S256'
      + '&access_type=offline'
      + '&prompt=consent';
    window.location.href = url;
  }
  window.signInGoogle = signInGoogle;

  async function checkGoogleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    if (!code) return;
    if (state !== sessionStorage.getItem('pkce_state')) { showToast('❌ Erreur state'); return; }
    const verifier = sessionStorage.getItem('pkce_verifier');
    history.replaceState(null, '', window.location.pathname);
    try {
      const res = await fetch('https://oauth2.googleapis.com/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          client_id: G_CLIENT_ID,
          grant_type: 'authorization_code',
          code: code,
          redirect_uri: G_REDIRECT,
          code_verifier: verifier
        })
      });
      const data = await res.json();
      if (data.access_token) {
        gToken = data.access_token;
        sessionStorage.setItem('g_token', gToken);
        const btn = document.getElementById('msBtn');
        btn.textContent = '✅ Google connecté';
        btn.style.background = '#076880';
        showToast('✅ Connecté à Google !');
      } else {
        showToast('❌ ' + (data.error_description || data.error || 'Erreur auth'));
      }
    } catch(e) {
      showToast('❌ ' + e.message);
    }
  }

  // Récupère token en session
  gToken = sessionStorage.getItem('g_token');
  if (gToken) {
    document.getElementById('msBtn').textContent = '✅ Google connecté';
    document.getElementById('msBtn').style.background = '#076880';
  }
  checkGoogleCallback();

  async function createCalendarEvent(task) {
    if (!gToken || !task.heure) return;
    const today = new Date().toISOString().split('T')[0];
    const start = today + 'T' + task.heure + ':00';
    const end = new Date(new Date(start).getTime() + 3600000).toISOString();
    await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + gToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        summary: task.titre,
        start: { dateTime: start, timeZone: 'Europe/Paris' },
        end: { dateTime: end, timeZone: 'Europe/Paris' }
      })
    });
  }

  async function createTask(task) {
    if (!gToken) return;
    const listsRes = await fetch('https://tasks.googleapis.com/tasks/v1/users/@me/lists', {
      headers: { 'Authorization': 'Bearer ' + gToken }
    });
    const lists = await listsRes.json();
    const listId = lists.items[0].id;
    await fetch('https://tasks.googleapis.com/tasks/v1/lists/' + listId + '/tasks', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + gToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: task.titre })
    });
  }

  // ── Micro ──────────────────────────────────────────────────
  let recognition = null, isRecording = false;

  function toggleRecording() {
    if (!GROQ_KEY) { showToast('⚠️ Entre ta clé Groq d\'abord !'); return; }
    isRecording ? stopRecording() : startRecording();
  }
  window.toggleRecording = toggleRecording;

  function startRecording() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast('❌ Micro non supporté'); return; }
    recognition = new SR();
    recognition.lang = 'fr-FR';
    recognition.continuous = false;
    recognition.interimResults = true;
    let finalTranscript = '';

    recognition.onstart = () => {
      isRecording = true; finalTranscript = '';
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹️';
      document.getElementById('micLabel').textContent = 'En écoute...';
      document.getElementById('transcriptBox').classList.add('visible');
      document.getElementById('transcriptText').textContent = '...';
    };
    recognition.onresult = e => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      document.getElementById('transcriptText').textContent = finalTranscript || interim || '...';
    };
    recognition.onerror = e => { showToast('❌ ' + e.error); resetMic(); };
    recognition.onend = () => {
      const txt = document.getElementById('transcriptText').textContent;
      const best = finalTranscript.trim() || txt.trim();
      if (best && best !== '...') analyzeWithGroq(best);
      else { showToast('⚠️ Rien entendu, réessaie'); resetMic(); }
    };
    recognition.start();
  }

  function stopRecording() { if (recognition) recognition.stop(); resetMic(); }

  function resetMic() {
    isRecording = false;
    const btn = document.getElementById('micBtn');
    btn.classList.remove('recording','loading');
    btn.textContent = '🎙️';
    document.getElementById('micLabel').textContent = 'Appuie pour parler';
  }

  // ── Groq ───────────────────────────────────────────────────
  async function analyzeWithGroq(transcript) {
    const btn = document.getElementById('micBtn');
    btn.classList.add('loading'); btn.textContent = '⏳';
    document.getElementById('micLabel').textContent = 'L\'IA analyse...';

    const prompt = `Tu es un assistant personnel. L'utilisateur te parle le matin.
Voici ce qu'il a dit : "${transcript}"
Réponds en JSON uniquement, sans markdown, sans backticks. Format exact :
{"reponse":"Une réponse naturelle et encourageante (2-3 phrases)","taches":[{"titre":"titre","heure":"HH:MM ou vide","type":"urgent|normal|rappel"}]}`;

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
        body:JSON.stringify({ model:'llama-3.3-70b-versatile', messages:[{role:'user',content:prompt}], temperature:0.7 })
      });
      const data = await res.json();
      if (data.error) { showToast('❌ ' + data.error.message); resetMic(); return; }
      let raw = data.choices[0].message.content.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(raw);

      document.getElementById('responseText').textContent = parsed.reponse;
      document.getElementById('responseBox').classList.add('visible');
      showTasks(parsed.taches || []);

      if (gToken && parsed.taches) {
        for (const t of parsed.taches) {
          if (t.heure) await createCalendarEvent(t);
          else await createTask(t);
        }
        showToast('✅ Ajouté dans Google Calendar & Tasks !');
      }

      speak(parsed.reponse);
    } catch(err) {
      showToast('❌ ' + err.message);
    }
    resetMic();
  }

  function showTasks(tasks) {
    const list = document.getElementById('tasksList');
    if (list.querySelector('.empty-state')) list.innerHTML = '';
    tasks.forEach(t => {
      const dot = t.type==='urgent' ? 'dot-urgent' : t.type==='rappel' ? 'dot-reminder' : 'dot-normal';
      const card = document.createElement('div');
      card.className = 'task-card';
      card.innerHTML = `<div class="task-dot ${dot}"></div>
        <div class="task-info">
          <div class="task-title">${t.titre}</div>
          <div class="task-meta">${t.type}${t.heure?' · '+t.heure:''}</div>
        </div>
        <div class="task-check" onclick="this.classList.toggle('done');this.textContent=this.classList.contains('done')?'✓':''"></div>`;
      list.appendChild(card);
    });
  }

  function speak(text) {
    if (!window.speechSynthesis) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR'; u.rate = 1.05;
    window.speechSynthesis.speak(u);
  }

})();
</script>
</body>
</html>
