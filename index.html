<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Assistant">

<title>Mon Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;color:#fff}
input,textarea{color:#fff!important}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.4)!important}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#054f64;min-height:100vh;padding-bottom:40px}
header{padding:50px 20px 16px;text-align:center}
.date{font-size:12px;color:#B5CAC1;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
h1{font-size:22px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px}
/* Nav tabs */
.tabs{display:flex;margin:16px 20px;background:#043d4f;border-radius:12px;padding:4px;gap:4px}
.tab{flex:1;padding:10px 6px;text-align:center;font-size:13px;border-radius:9px;cursor:pointer;transition:all 0.2s;color:#B5CAC1}
.tab.active{background:#076880;color:#fff;font-weight:500}
/* Pages */
.page{display:none;padding:0 20px}
.page.active{display:block}
/* Boutons */
.btn-primary{width:100%;background:#076880;border:1px solid #B5CAC1;border-radius:12px;padding:13px;font-size:14px;cursor:pointer;text-align:center;margin-bottom:10px}
.btn-google{background:#054f64!important}
.btn-save{background:#B5CAC1;color:#054f64!important;border:none;border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;font-weight:600}
/* Micro */
.mic-area{display:flex;flex-direction:column;align-items:center;padding:28px 0;gap:14px}
.mic-btn{width:86px;height:86px;border-radius:50%;border:none;background:linear-gradient(135deg,#076880,#B5CAC1);cursor:pointer;font-size:34px;box-shadow:0 0 28px rgba(181,202,193,0.3);transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.mic-btn.recording{background:linear-gradient(135deg,#ff4757,#ff6b81);animation:pulse 1.2s infinite}
.mic-btn.loading{animation:glow 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes glow{0%,100%{box-shadow:0 0 28px rgba(181,202,193,0.3)}50%{box-shadow:0 0 55px rgba(181,202,193,0.7)}}
.mic-label{font-size:14px;color:#B5CAC1}
/* Cards */
.card{background:#076880;border:1px solid rgba(181,202,193,0.4);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card-title{font-size:15px;font-weight:500;margin-bottom:3px}
.card-meta{font-size:12px;color:#B5CAC1}
/* Section headers */
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:#B5CAC1;margin:18px 0 8px;display:flex;align-items:center;justify-content:space-between}
.sec-title span{cursor:pointer;font-size:16px}
/* Catégories */
.cat-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;margin-right:6px}
.cat-urgences{background:rgba(255,71,87,0.25);color:#ff8f9a}
.cat-travail{background:rgba(74,144,217,0.25);color:#7ab8f5}
.cat-projets{background:rgba(181,202,193,0.2);color:#B5CAC1}
.cat-personnel{background:rgba(46,213,115,0.2);color:#7eeaaa}
/* Formulaire ajout */
.add-form{background:#043d4f;border:1px solid rgba(181,202,193,0.3);border-radius:16px;padding:16px;margin-bottom:16px}
.add-form input,.add-form select{width:100%;background:#076880;border:1px solid rgba(181,202,193,0.4);border-radius:10px;padding:10px 14px;font-size:14px;outline:none;margin-bottom:10px}
.add-form select option{background:#054f64}
.add-form .row{display:flex;gap:8px}
.add-form .row input{margin-bottom:0}
/* Transcript / réponse */
.info-box{background:#043d4f;border:1px solid rgba(181,202,193,0.3);border-radius:14px;padding:14px;margin-bottom:12px;display:none}
.info-box.visible{display:block}
.info-box .lbl{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#B5CAC1;margin-bottom:6px}
/* Task check */
.task-row{display:flex;align-items:center;gap:12px}
.task-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-urgences{background:#ff4757}.dot-travail{background:#4a90d9}.dot-projets{background:#B5CAC1}.dot-personnel{background:#2ed573}
.check{width:22px;height:22px;border-radius:50%;border:2px solid #B5CAC1;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-left:auto;transition:all 0.2s}
.check.done{background:#B5CAC1;color:#054f64}
/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#076880;border:1px solid #B5CAC1;border-radius:20px;padding:10px 20px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.slide{animation:slideIn 0.3s ease}
</style>
</head>

<div class="toast" id="toast"></div>

<script>
(function(){

// ── Clé Groq intégrée ─────────────────────────────────────
const GROQ_KEY = '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';

function switchTab(name){

// ── Google Auth ───────────────────────────────────────────
const G_CLIENT_ID='388486752894-ekeiej8dkbq6iql51cifhphe828nrn8e.apps.googleusercontent.com';
const G_SCOPES='https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/tasks';
let gToken=sessionStorage.getItem('g_token')||null;

// ── Google Calendar ───────────────────────────────────────
async function createCalendarEvent(titre,date,heure,cat){
  if(!gToken)return;
  const body=heure?{
    summary:`[${cat}] ${titre}`,
    start:{dateTime:date+'T'+heure+':00',timeZone:'Europe/Paris'},
    end:{dateTime:new Date(new Date(date+'T'+heure+':00').getTime()+3600000).toISOString().replace('Z',''),timeZone:'Europe/Paris'}
  }:{
    summary:`[${cat}] ${titre}`,
    start:{date},end:{date}
  };
  const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
    method:'POST',headers:{'Authorization':'Bearer '+gToken,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  return r.ok;
}

// ── Google Tasks ──────────────────────────────────────────
let cachedListId=null;
async function getListId(){
  if(cachedListId)return cachedListId;
  const r=await fetch('https://tasks.googleapis.com/tasks/v1/users/@me/lists',{headers:{'Authorization':'Bearer '+gToken}});
  const d=await r.json();
  cachedListId=d.items[0].id;
  return cachedListId;
}

async function createGoogleTask(titre,date,cat){
  if(!gToken)return;
  const listId=await getListId();
  const body={title:`[${cat}] ${titre}`};
  if(date)body.due=date+'T00:00:00.000Z';
  const r=await fetch('https://tasks.googleapis.com/tasks/v1/lists/'+listId+'/tasks',{
    method:'POST',headers:{'Authorization':'Bearer '+gToken,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  return r.ok;
}

// ── Ajout manuel ──────────────────────────────────────────
async function addToCalendar(){
  const titre=document.getElementById('addTitle').value.trim();
  const cat=document.getElementById('addCat').value;
  const date=document.getElementById('addDate').value;
  const heure=document.getElementById('addTime').value;
  if(!titre){showToast('⚠️ Entre un titre');return;}
  if(!gToken){showToast('⚠️ Connecte Google d\'abord');return;}
  const ok=await createCalendarEvent(titre,date,heure,cat);
  if(ok){showToast('✅ Ajouté dans Calendar !');document.getElementById('addTitle').value='';}
  else showToast('❌ Erreur Calendar');
}
window.addToCalendar=addToCalendar;

async function addToTasks(){

  const cat=document.getElementById('addCat').value;
  const date=document.getElementById('addDate').value;
  if(!titre){showToast('⚠️ Entre un titre');return;}
  if(!gToken){showToast('⚠️ Connecte Google d\'abord');return;}
  const ok=await createGoogleTask(titre,date,cat);
  if(ok){showToast('✅ Ajouté dans Tasks !');document.getElementById('addTitle').value='';}
  else showToast('❌ Erreur Tasks');
}
window.addToTasks=addToTasks;

// ── Dashboard ─────────────────────────────────────────────
async function loadDashboard(){
  if(!gToken){return;}
  const dash=document.getElementById('dashboard');
  dash.innerHTML='<div style="color:#B5CAC1;text-align:center;padding:20px">Chargement...</div>';
  try{
    const now=new Date();
    const in14=new Date(now.getTime()+14*24*3600*1000);
    const calR=await fetch(
      'https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin='+now.toISOString()+'&timeMax='+in14.toISOString()+'&orderBy=startTime&singleEvents=true&maxResults=30',
      {headers:{'Authorization':'Bearer '+gToken}}
    );
    const calD=await calR.json();
    const events=(calD.items||[]);

    const listId=await getListId();
    const tR=await fetch('https://tasks.googleapis.com/tasks/v1/lists/'+listId+'/tasks?showCompleted=false&maxResults=30',{headers:{'Authorization':'Bearer '+gToken}});
    const tD=await tR.json();
    const tasks=(tD.items||[]);

    // Catégoriser avec l'IA
    const allItems=[
      ...events.map(e=>({id:e.id,titre:e.summary||'Sans titre',type:'event',date:e.start.dateTime||e.start.date,heure:e.start.dateTime?new Date(e.start.dateTime).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):''})),
      ...tasks.map(t=>({id:t.id,titre:t.title||'Sans titre',type:'task',date:t.due?t.due.split('T')[0]:''}))
    ];

    if(!allItems.length){
      dash.innerHTML='<div style="color:#B5CAC1;text-align:center;padding:30px">Aucun élément à venir 🎉</div>';
      return;
    }

    // Tri par catégorie via IA
    const aiPrompt=`Analyse ces éléments et classe-les dans les catégories : urgences, travail, projets, personnel.
Réponds UNIQUEMENT en JSON : {"urgences":[],"travail":[],"projets":[],"personnel":[]}
Chaque tableau contient les indices (0-based) des éléments correspondants.
Éléments : ${allItems.map((it,i)=>`${i}: "${it.titre}"`).join(', ')}`;

    let cats={urgences:[],travail:[],projets:[],personnel:[]};
    try{
      const aiR=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
        body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:aiPrompt}],temperature:0.3,max_tokens:500})
      });
      const aiD=await aiR.json();
      const raw=aiD.choices[0].message.content.replace(/```json|```/g,'').trim();
      cats=JSON.parse(raw);
    }catch(e){}

    // Affichage par catégorie
    const catLabels={urgences:'🚨 Urgences',travail:'💼 Travail',projets:'🚀 Projets',personnel:'👤 Personnel'};
    let html='';
    for(const [cat,indices] of Object.entries(cats)){
      if(!indices.length)continue;
      html+=`<div class="sec-title">${catLabels[cat]}</div>`;
      indices.forEach(i=>{
        const it=allItems[i];
        if(!it)return;
        const dateStr=it.date?new Date(it.date).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'}):'';
        html+=`<div class="card slide">
          <div class="task-row">
            <div class="task-dot dot-${cat}"></div>
            <div style="flex:1">
              <div class="card-title">${it.titre.replace(/\[.*?\]\s*/,'')}</div>
              <div class="card-meta">${it.type==='event'?'📅':'✅'} ${dateStr}${it.heure?' · '+it.heure:''}</div>
            </div>
          </div>
        </div>`;
      });
    }
    dash.innerHTML=html||'<div style="color:#B5CAC1;text-align:center;padding:30px">Aucun élément à venir 🎉</div>';
  }catch(e){
    dash.innerHTML='<div style="color:#B5CAC1;text-align:center;padding:20px">Erreur : '+e.message+'</div>';
  }
}
window.loadDashboard=loadDashboard;

// ── Micro ─────────────────────────────────────────────────
let recognition=null,isRecording=false;

function toggleRecording(){
  isRecording?stopRecording():startRecording();
}
window.toggleRecording=toggleRecording;

function startRecording(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('❌ Micro non supporté');return;}
  recognition=new SR();
  recognition.lang='fr-FR';recognition.continuous=false;recognition.interimResults=true;
  let final='';
  recognition.onstart=()=>{
    isRecording=true;final='';
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent='⏹️';
    document.getElementById('micLabel').textContent='En écoute...';
    document.getElementById('transcriptBox').classList.add('visible');
    document.getElementById('transcriptText').textContent='...';
  };
  recognition.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    document.getElementById('transcriptText').textContent=final||interim||'...';
  };
  recognition.onerror=e=>{showToast('❌ '+e.error);resetMic();};
  recognition.onend=()=>{
    const txt=document.getElementById('transcriptText').textContent;
    const best=final.trim()||txt.trim();
    if(best&&best!=='...')analyzeWithGroq(best);
    else{showToast('⚠️ Rien entendu');resetMic();}
  };
  recognition.start();
}

function stopRecording(){if(recognition)recognition.stop();resetMic();}

function resetMic(){
  isRecording=false;
  const btn=document.getElementById('micBtn');
  btn.classList.remove('recording','loading');
  btn.textContent='🎙️';
  document.getElementById('micLabel').textContent='Appuie pour parler';
}

// ── Groq ──────────────────────────────────────────────────
async function analyzeWithGroq(transcript){
  document.getElementById('micBtn').classList.add('loading');
  document.getElementById('micBtn').textContent='⏳';
  document.getElementById('micLabel').textContent='Analyse...';

  const today=new Date();
  const todayISO=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  function nextDay(target){
    const d=new Date(today.getFullYear(),today.getMonth(),today.getDate());
    let diff=target-d.getDay();
    if(diff<=0)diff+=7;
    d.setDate(d.getDate()+diff);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  const tom=new Date(today.getFullYear(),today.getMonth(),today.getDate()+1);
  const tomISO=tom.getFullYear()+'-'+String(tom.getMonth()+1).padStart(2,'0')+'-'+String(tom.getDate()).padStart(2,'0');

  const daysMap={'lundi':nextDay(1),'mardi':nextDay(2),'mercredi':nextDay(3),'jeudi':nextDay(4),'vendredi':nextDay(5),'samedi':nextDay(6),'dimanche':nextDay(0),'demain':tomISO};

  const prompt=`Tu es un assistant personnel. L'utilisateur te parle le matin.
Aujourd'hui : ${today.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} (${todayISO})

Correspondance EXACTE des dates :
${Object.entries(daysMap).map(([k,v])=>`"${k}" = ${v}`).join(', ')}

Message : "${transcript}"

RÈGLES :
- Utilise EXACTEMENT les dates ci-dessus, ne recalcule jamais
- Catégorie parmi : urgences, travail, projets, personnel
- Si pas de jour mentionné → aujourd'hui : ${todayISO}

JSON uniquement sans markdown :
{"reponse":"2-3 phrases naturelles","taches":[{"titre":"titre","date":"YYYY-MM-DD","heure":"HH:MM ou vide","type":"urgent|normal|rappel","categorie":"urgences|travail|projets|personnel"}]}`;

  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],temperature:0.7})
    });
    const data=await res.json();
    if(data.error){showToast('❌ '+data.error.message);resetMic();return;}
    const parsed=JSON.parse(data.choices[0].message.content.replace(/```json|```/g,'').trim());

    document.getElementById('responseText').textContent=parsed.reponse;
    document.getElementById('responseBox').classList.add('visible');

    // Affiche tâches du jour
    const todayList=document.getElementById('todayTasks');
    if(parsed.taches&&parsed.taches.length){
      if(!todayList.querySelector('.sec-title'))todayList.innerHTML='<div class="sec-title">Tâches ajoutées</div>';
      parsed.taches.forEach(t=>{
        const cat=t.categorie||'travail';
        const card=document.createElement('div');
        card.className='card slide';
        card.innerHTML=`<div class="task-row">
          <div class="task-dot dot-${cat}"></div>
          <div style="flex:1">
            <div class="card-title">${t.titre}</div>
            <div class="card-meta"><span class="cat-badge cat-${cat}">${cat}</span>${t.date?' · '+new Date(t.date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'}):''}${t.heure?' · '+t.heure:''}</div>
          </div>
          <div class="check" onclick="this.classList.toggle('done');this.textContent=this.classList.contains('done')?'✓':''"></div>
        </div>`;
        todayList.appendChild(card);
      });

      // Sync Google
      if(gToken){
        for(const t of parsed.taches){
          await createCalendarEvent(t.titre,t.date||todayISO,t.heure,t.categorie||'travail');
          await createGoogleTask(t.titre,t.date||todayISO,t.categorie||'travail');
        }
        showToast('✅ Sync Google Calendar & Tasks !');
      }
    }

    speak(parsed.reponse);
  }catch(err){
    showToast('❌ '+err.message);
  }
  resetMic();
}

function speak(text){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang='fr-FR';u.rate=1.05;
  window.speechSynthesis.speak(u);
}

})();
</script>
</body>
